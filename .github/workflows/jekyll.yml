name: Build and Deploy Jekyll Site

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allow manual triggers

# Sets permissions for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.2' # Match your local version
          bundler-cache: true # This runs bundle install and caches gems

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm install --legacy-peer-deps

      - name: Build with Jekyll
        run: bundle exec jekyll build --verbose
        env:
          JEKYLL_ENV: production

      - name: Make encryption script executable
        run: chmod +x scripts/encrypt-jekyll.sh

      - name: Encrypt specified pages
        run: ./scripts/encrypt-jekyll.sh --skip-build --config config/encrypted-pages.yml
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}

      - name: Obfuscate JavaScript in HTML pages
        run: node scripts/obfuscate-html.js

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4